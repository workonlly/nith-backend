# Matches src/.env — Postgres + MinIO for local development
services:
  postgres:
    image: postgres:16-alpine
    container_name: nith-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword123
      POSTGRES_DB: nith
    ports:
      - "5432:5432"
    volumes:
      - nith_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d nith"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nith-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - nith_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Creates buckets used by the backend (images, downloads)
  minio-init:
    image: minio/mc:latest
    container_name: nith-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb -p local/images || true &&
      mc mb -p local/downloads || true &&
      mc anonymous set download local/images || true &&
      echo MinIO buckets ready
      "

volumes:
  nith_pg_data:
  nith_minio_data:
